<form (ngSubmit)="onSubmit()">
  <div class="form-group">
    <label for="title">Title *</label>
    <input id="title" name="title" [(ngModel)]="form.title" required placeholder="Entry title">
  </div>
  <div class="form-group">
    <label for="entryDate">Date *</label>
    <input id="entryDate" name="entryDate" type="date" [(ngModel)]="form.entryDate" required>
  </div>
  <div class="form-group">
    <label for="mood">Mood</label>
    <select id="mood" name="mood" [(ngModel)]="form.mood">
      <option *ngFor="let m of moods" [value]="m">{{ m }}</option>
    </select>
  </div>
  <div class="form-group">
    <label for="content">Content</label>
    <textarea id="content" name="content" [(ngModel)]="form.content" placeholder="Write freely..."></textarea>
  </div>
  <div class="modal-actions">
    <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancel</button>
    <button type="submit" class="btn btn-primary" [disabled]="!isValid()">
      {{ isEditMode ? 'Update' : 'Save' }}
    </button>
  </div>
</form>
