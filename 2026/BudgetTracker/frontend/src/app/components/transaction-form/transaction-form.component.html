<form (ngSubmit)="onSubmit()">
  <div class="form-group">
    <label for="type">Type *</label>
    <select id="type" name="type" [(ngModel)]="form.type">
      <option value="INCOME">Income</option>
      <option value="EXPENSE">Expense</option>
    </select>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="amount">Amount *</label>
      <input id="amount" name="amount" type="number" min="0" step="0.01" [(ngModel)]="form.amount" required>
    </div>
    <div class="form-group">
      <label for="transactionDate">Date *</label>
      <input id="transactionDate" name="transactionDate" type="date" [(ngModel)]="form.transactionDate" required>
    </div>
  </div>

  <div class="form-group">
    <label for="category">Category</label>
    <select id="category" name="category" [(ngModel)]="form.category">
      <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
    </select>
  </div>

  <div class="form-group">
    <label for="description">Description</label>
    <textarea id="description" name="description" [(ngModel)]="form.description" placeholder="Optional"></textarea>
  </div>

  <div class="modal-actions">
    <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancel</button>
    <button type="submit" class="btn btn-primary" [disabled]="!isValid()">
      {{ isEditMode ? 'Update' : 'Add' }}
    </button>
  </div>
</form>
