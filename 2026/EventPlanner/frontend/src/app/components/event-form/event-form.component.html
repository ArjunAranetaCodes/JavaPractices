<form (ngSubmit)="onSubmit()">
  <div class="form-group">
    <label for="title">Title *</label>
    <input id="title" name="title" [(ngModel)]="form.title" required placeholder="Event title">
  </div>
  <div class="form-group">
    <label for="startDateTime">Start *</label>
    <input id="startDateTime" name="startDateTime" type="datetime-local" [(ngModel)]="form.startDateTime" required>
  </div>
  <div class="form-group">
    <label for="endDateTime">End *</label>
    <input id="endDateTime" name="endDateTime" type="datetime-local" [(ngModel)]="form.endDateTime" required>
  </div>
  <div class="form-group">
    <label for="location">Location</label>
    <input id="location" name="location" [(ngModel)]="form.location" placeholder="Address or venue">
  </div>
  <div class="form-group">
    <label for="category">Category</label>
    <select id="category" name="category" [(ngModel)]="form.category">
      <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
    </select>
  </div>
  <div class="form-group">
    <label for="status">Status</label>
    <select id="status" name="status" [(ngModel)]="form.status">
      <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
    </select>
  </div>
  <div class="form-group">
    <label for="description">Description</label>
    <textarea id="description" name="description" [(ngModel)]="form.description"></textarea>
  </div>
  <div class="modal-actions">
    <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancel</button>
    <button type="submit" class="btn btn-primary" [disabled]="!isValid()">
      {{ isEditMode ? 'Update' : 'Add' }}
    </button>
  </div>
</form>
